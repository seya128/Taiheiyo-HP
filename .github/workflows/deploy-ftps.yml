name: Deploy to Production (FTPS)

on:
  push:
    branches: [main]
  workflow_dispatch:

# 同時実行を1つに制限（進行中の転送はキャンセルしない）
concurrency:
  group: ftps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # BIGLOBE の FTPS は MLSD 非対応で FTP-Deploy-Action / lftp と相性が悪いため、
      # 標準ライブラリ ftplib(FTP_TLS) の自作スクリプトで public/ を転送する。
      - name: Deploy via FTPS
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: python3 scripts/deploy_ftps.py
