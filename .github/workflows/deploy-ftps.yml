name: Deploy to Production (FTPS)

on:
  push:
    branches: [main]
  workflow_dispatch:

# 同時実行を1つに制限（進行中の転送はキャンセルしない）
concurrency:
  group: ftps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y lftp

      # BIGLOBE の FTPS は MLSD 非対応のため、MLSD前提のアクションは使えない。
      # LIST ベースで動く lftp の mirror を使用する。
      - name: Deploy via FTPS (lftp mirror)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -c "
          set ftp:ssl-force true;
          set ftp:ssl-protect-data true;
          set ssl:verify-certificate no;
          set net:max-retries 2;
          set net:timeout 20;
          open -u '$FTP_USERNAME','$FTP_PASSWORD' '$FTP_SERVER';
          mirror --reverse --verbose --parallel=4 ./public/ /public_html/;
          bye;
          "
